version: '3.8'

services:
  # PostgreSQL Database Container
  postgres:
    image: postgres:15-alpine
    container_name: claimshield_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: claimshield
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Express Backend Container
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: claimshield_backend
    restart: always
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgrespassword@postgres:5432/claimshield?schema=public
      - DEMO_MODE=true
      - JWT_SECRET=claimshield-super-secret-key-2026
      - RUN_SEED=true
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: http://localhost:5000/api
    container_name: claimshield_frontend
    restart: always
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:5000/api
      - NEXT_PUBLIC_DEMO_MODE=true
    depends_on:
      - backend

volumes:
  pgdata:
